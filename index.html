<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>loading...</title>
<style>
  :root{
    --bg:#0a0a0a;
    --text:#e8e8e8;
    --accent:#ff2d2d;
    --muted:#666;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    width:100%;
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Courier New', monospace;
    overflow:hidden;
  }

  /* ---------- LANDING PAGE ---------- */
  .landing{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:24px;
    text-align:center;
    padding:20px;
  }

  .landing h1{
    font-size:clamp(20px, 5vw, 32px);
    letter-spacing:1px;
    color:var(--muted);
    font-weight:400;
  }

  .btn{
    background:transparent;
    border:2px solid var(--text);
    color:var(--text);
    font-family:inherit;
    font-size:18px;
    padding:16px 40px;
    cursor:pointer;
    letter-spacing:2px;
    transition:transform .15s ease, background .15s ease, color .15s ease;
  }

  .btn:hover{
    background:var(--text);
    color:#000;
    transform:scale(1.04);
  }

  .btn:active{
    transform:scale(.97);
  }

  .hint{
    color:var(--muted);
    font-size:12px;
  }

  /* ---------- PRANK SCREEN (fallback if popup is blocked) ---------- */
  .prank-screen{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    overflow:hidden;
  }

  .prank-screen.active{
    display:block;
  }

  .prank-img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:contrast(1.15) saturate(1.3);
  }

  @keyframes shake{
    0%{ transform:translate(0,0) rotate(0deg); }
    10%{ transform:translate(-12px,-8px) rotate(-1deg); }
    20%{ transform:translate(10px,6px) rotate(1deg); }
    30%{ transform:translate(-8px,10px) rotate(-2deg); }
    40%{ transform:translate(12px,-6px) rotate(2deg); }
    50%{ transform:translate(-10px,-10px) rotate(-1deg); }
    60%{ transform:translate(8px,8px) rotate(1deg); }
    70%{ transform:translate(-12px,4px) rotate(-2deg); }
    80%{ transform:translate(10px,-8px) rotate(2deg); }
    90%{ transform:translate(-6px,6px) rotate(-1deg); }
    100%{ transform:translate(0,0) rotate(0deg); }
  }

  .shaking{
    animation: shake .35s infinite;
  }

  .glitch-overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    mix-blend-mode:screen;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(255,0,60,0.08) 0px,
        rgba(255,0,60,0.08) 2px,
        transparent 2px,
        transparent 4px
      );
    animation: flicker .12s steps(2) infinite;
  }

  @keyframes flicker{
    0%{ opacity:.9; }
    50%{ opacity:.4; }
    100%{ opacity:.8; }
  }

  .glitch-overlay::before{
    content:"";
    position:absolute;
    inset:0;
    background:var(--accent);
    opacity:0;
    animation: flash 1.4s ease-in-out infinite;
  }

  @keyframes flash{
    0%, 92%, 100%{ opacity:0; }
    94%{ opacity:.25; }
    96%{ opacity:0; }
  }

  .vignette{
    position:absolute;
    inset:0;
    pointer-events:none;
    box-shadow: inset 0 0 200px 60px rgba(0,0,0,0.85);
  }

  .close-hint{
    position:absolute;
    bottom:16px;
    left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,0.35);
    font-size:11px;
    letter-spacing:1px;
    z-index:10;
  }

  @media (prefers-reduced-motion: reduce){
    .shaking{ animation:none; }
    .glitch-overlay{ animation:none; }
    .glitch-overlay::before{ animation:none; }
  }
</style>
</head>
<body>

  <!-- this is what the friend sees first, in the link they were sent -->
  <div class="landing" id="landing">
    <h1>are you sure you want to continue?</h1>
    <button class="btn" id="trigger">CLICK ME</button>
    <div class="hint">turn your volume up first</div>
  </div>

  <!-- fallback prank screen, only used if the popup window gets blocked -->
  <div class="prank-screen" id="prankScreen">
    <img class="prank-img shaking" id="prankImg" src="https://i.pinimg.com/736x/98/5f/64/985f6478f070be18728e1a979b23026d.jpg" alt="">
    <div class="glitch-overlay"></div>
    <div class="vignette"></div>
    <div class="close-hint">click anywhere to close</div>
  </div>

  <audio id="prankAudio" src="https://worldwide-cyan-citufupp.edgeone.dev/basuri.mp3" loop preload="auto"></audio>

  <script>
    const SOUND_URL = "https://worldwide-cyan-citufupp.edgeone.dev/basuri.mp3";
    const IMAGE_URL = "https://i.pinimg.com/736x/98/5f/64/985f6478f070be18728e1a979b23026d.jpg";

    const trigger      = document.getElementById('trigger');
    const landing       = document.getElementById('landing');
    const originalAudio = document.getElementById('prankAudio');

    trigger.addEventListener('click', () => {

      // 1) play the sound in THIS (original) tab/window
      originalAudio.currentTime = 0;
      originalAudio.play().catch(() => {
        // autoplay might be blocked until a user gesture, but this click IS the gesture
      });

      // 2) open a brand new window that also plays the sound and shows the prank screen
      const popup = window.open('', '_blank', 'fullscreen=yes');

      if (popup) {
        popup.document.write(getPopupHTML());
        popup.document.close();
      } else {
        // popup blocked: fall back to showing the prank fullscreen in the SAME window
        showPrankInPlace();
      }
    });

    function showPrankInPlace(){
      landing.style.display = 'none';
      document.getElementById('prankScreen').classList.add('active');
      document.body.addEventListener('click', () => location.reload());
    }

    function getPopupHTML(){
      return `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>:)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;cursor:pointer;}
  .wrap{position:fixed;inset:0;}
  img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    filter:contrast(1.15) saturate(1.3);
    animation: shake .35s infinite;
  }
  @keyframes shake{
    0%{transform:translate(0,0) rotate(0deg);}
    10%{transform:translate(-12px,-8px) rotate(-1deg);}
    20%{transform:translate(10px,6px) rotate(1deg);}
    30%{transform:translate(-8px,10px) rotate(-2deg);}
    40%{transform:translate(12px,-6px) rotate(2deg);}
    50%{transform:translate(-10px,-10px) rotate(-1deg);}
    60%{transform:translate(8px,8px) rotate(1deg);}
    70%{transform:translate(-12px,4px) rotate(-2deg);}
    80%{transform:translate(10px,-8px) rotate(2deg);}
    90%{transform:translate(-6px,6px) rotate(-1deg);}
    100%{transform:translate(0,0) rotate(0deg);}
  }
  .overlay{
    position:absolute;inset:0;pointer-events:none;mix-blend-mode:screen;
    background:repeating-linear-gradient(0deg,rgba(255,0,60,0.08) 0px,rgba(255,0,60,0.08) 2px,transparent 2px,transparent 4px);
    animation: flicker .12s steps(2) infinite;
  }
  @keyframes flicker{0%{opacity:.9;}50%{opacity:.4;}100%{opacity:.8;}}
  .vignette{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 200px 60px rgba(0,0,0,0.85);}
  .hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.35);font-family:monospace;font-size:11px;letter-spacing:1px;}
</style>
</head>
<body>
  <div class="wrap">
    <img src="${IMAGE_URL}" alt="">
    <div class="overlay"></div>
    <div class="vignette"></div>
    <div class="hint">click anywhere to close</div>
  </div>
  <audio id="a" src="${SOUND_URL}" loop autoplay></audio>
  <script>
    const a = document.getElementById('a');
    a.play().catch(()=>{});
    document.addEventListener('click', () => window.close());
    document.addEventListener('keydown', () => window.close());
  <\/script>
</body>
</html>`;
    }
  </script>

</body>
</html>
