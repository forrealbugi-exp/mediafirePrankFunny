<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>click_here.exe</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    width:100%;
    height:100%;
    background:#c0c0c0;
    color:#000;
    font-family:"MS Sans Serif", "Tahoma", Arial, sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:none;
  }

  .landing{
    width:100%;
    height:100vh;
    position:relative;
  }

  .titlebar{
    position:absolute;
    top:0; left:0; right:0;
    background:linear-gradient(to right, #000080, #1084d0);
    color:#fff;
    font-weight:bold;
    font-size:13px;
    padding:4px 6px;
    text-align:left;
  }

  .imgFrame{
    border:2px inset #fff;
    background:#888;
    padding:2px;
    position:fixed;
    display:inline-block;
  }

  #prankImg{
    max-width: 300px;
    max-height: 300px;
    width: auto;
    height: auto;
    display:block;
    position:relative;
    cursor:pointer;
  }

  #jumpscare{
    position:fixed;
    inset:0;
    z-index:9999;
    background:#000;
    display:none;
    opacity:0;
  }

  #jumpscare img{
    width:100%;
    height:100%;
    object-fit:fill;
    display:block;
  }

  #jumpscare.show{
    display:block;
  }

  #jumpscare.fading{
    transition: opacity 0.5s linear; 
  }
</style>
</head>
<body>

  <div class="landing" id="landing">
    <div class="titlebar">FREE 1,000,000 ROBOX 100% NO VIRUS  INSTANT</div>
    <div class="imgFrame" id="imgFrame">
      <img id="prankImg" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSULczY_gCRCT6O73v6ucSWx7x8K0VVm14UpQ&s" alt="">
    </div>
  </div>

  <div id="jumpscare">
    <img src="https://i.pinimg.com/736x/0e/34/c1/0e34c11574e7f2b96c016694d8b79748.jpg" alt="">
  </div>

  <audio id="fartAudio" src="https://embarrassing-brown-oa7iij3e.edgeone.dev/Bark%20Fart%20Sound%20Effect.mp3" preload="auto"></audio>
  <audio id="popupAudio" src="https://worldwide-cyan-citufupp.edgeone.dev/basuri.mp3" loop preload="auto"></audio>

  <script>
    // =====================================================================
    // CONFIG
    // =====================================================================
    const POPUP_SOUND_URL = "https://worldwide-cyan-citufupp.edgeone.dev/basuri.mp3";
    const POPUP_IMAGE_URL = "https://i.pinimg.com/1200x/06/f4/13/06f41331dc778762234ef181f7dc5178.jpg";

    const BPM = 142;

    const imgFrame    = document.getElementById('imgFrame');
    const prankImg    = document.getElementById('prankImg');
    const jumpscareEl = document.getElementById('jumpscare');
    const fartAudio   = document.getElementById('fartAudio');
    const popupAudio  = document.getElementById('popupAudio');

    let clickCount = 0;
    let dodging = false;
    
    // Default popup dimensions in case the image fails to load
    let originalPopupW = 400; 
    let originalPopupH = 400;

    // Preload the popup image in the background to grab its original natural size
    const preloader = new Image();
    preloader.onload = () => {
      originalPopupW = preloader.naturalWidth;
      originalPopupH = preloader.naturalHeight;
    };
    preloader.src = POPUP_IMAGE_URL;

    // -----------------------------------------------------------------
    // AUDIO RELIABILITY FIX
    // -----------------------------------------------------------------
    function playAudioReliably(audioEl){
      audioEl.currentTime = 0;
      audioEl.volume = 1;

      const tryPlay = () => {
        const p = audioEl.play();
        if (p !== undefined) {
          p.catch(() => {
            audioEl.addEventListener('canplaythrough', () => {
              audioEl.play().catch(()=>{});
            }, { once:true });
          });
        }
      };

      if (audioEl.readyState >= 3) {
        tryPlay();
      } else {
        audioEl.load();
        audioEl.addEventListener('canplaythrough', tryPlay, { once:true });
        tryPlay();
      }
    }

    // -----------------------------------------------------------------
    // DODGE BEHAVIOR (LINEAR ANIMATION, STRICT BOUNDARIES)
    // -----------------------------------------------------------------
    function dodgeImage(triggerJumpscare){
      if (dodging) return;
      dodging = true;

      const frameRect = imgFrame.getBoundingClientRect();
      
      // Calculate a strict safe zone (15% away from all screen edges)
      const marginX = window.innerWidth * 0.15; 
      const marginY = window.innerHeight * 0.15; 

      const minX = marginX;
      const minY = Math.max(marginY, 40); // Ensure it stays below the titlebar
      const maxX = window.innerWidth  - frameRect.width  - marginX;
      const maxY = window.innerHeight - frameRect.height - marginY;

      const startX = frameRect.left;
      const startY = frameRect.top;
      const targetX = minX + Math.random() * Math.max(1, (maxX - minX));
      const targetY = minY + Math.random() * Math.max(1, (maxY - minY));

      if (triggerJumpscare) {
        playAudioReliably(fartAudio);
        
        jumpscareEl.classList.remove('fading'); 
        jumpscareEl.classList.add('show');
        jumpscareEl.style.opacity = '1';

        requestAnimationFrame(() => {
          jumpscareEl.classList.add('fading');
          jumpscareEl.style.opacity = '0';
        });

        setTimeout(() => {
          jumpscareEl.classList.remove('show');
          jumpscareEl.classList.remove('fading');
        }, 600);
      }

      // Linear animation logic (350 milliseconds duration)
      const duration = 350;
      const t0 = performance.now();

      function frame(now){
        const t = Math.min((now - t0) / duration, 1);
        const x = startX + (targetX - startX) * t;
        const y = startY + (targetY - startY) * t;
        imgFrame.style.left = x + 'px';
        imgFrame.style.top  = y + 'px';

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          dodging = false; // unlock interaction when animation finishes
        }
      }
      requestAnimationFrame(frame);
    }

    window.addEventListener('load', () => {
      const frameRect = imgFrame.getBoundingClientRect();
      const startX = (window.innerWidth - frameRect.width) / 2;
      const startY = (window.innerHeight - frameRect.height) / 2;
      
      imgFrame.style.position = 'fixed';
      imgFrame.style.left = startX + 'px';
      imgFrame.style.top  = startY + 'px';
      imgFrame.style.margin = '0';
    });

    // -----------------------------------------------------------------
    // CLICK LISTENER
    // -----------------------------------------------------------------
    prankImg.addEventListener('click', (e) => {
      e.stopPropagation();
      clickCount++;

      if (clickCount === 1) {
        dodgeImage(false);
      } 
      else if (clickCount === 2) {
        dodgeImage(true);
      } 
      else if (clickCount >= 3) {
        triggerPrank();
      }
    });

    function triggerPrank(){
      playAudioReliably(popupAudio);

      // Get the screen dimensions to make sure the popup isn't larger than the monitor
      const sw = window.screen.availWidth;
      const sh = window.screen.availHeight;

      // Use original image size, but cap it so it has room to jump on the screen
      const popupW = Math.min(originalPopupW, sw - 100);
      const popupH = Math.min(originalPopupH, sh - 200);

      const popup = window.open('', '_blank', `width=${popupW},height=${popupH}`);

      if (popup) {
        popup.document.write(getPopupHTML(popupW, popupH));
        popup.document.close();
      }
    }

    // -----------------------------------------------------------------
    // POPUP HTML
    // -----------------------------------------------------------------
    function getPopupHTML(popupW, popupH){
      return `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>:)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:#000;
    overflow:hidden;
    cursor:pointer;
  }
  #img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:0;
    image-rendering:pixelated;
    will-change:transform;
  }
</style>
</head>
<body>
  <img id="img" src="${POPUP_IMAGE_URL}" alt="">
  <audio id="a" src="${POPUP_SOUND_URL}" loop preload="auto"></audio>
  <script>
    const a = document.getElementById('a');
    function tryPlay(){
      a.currentTime = 0;
      const p = a.play();
      if (p !== undefined) {
        p.catch(() => {
          a.addEventListener('canplaythrough', () => a.play().catch(()=>{}), { once:true });
        });
      }
    }
    if (a.readyState >= 3) { tryPlay(); }
    else { a.load(); a.addEventListener('canplaythrough', tryPlay, { once:true }); tryPlay(); }

    const screenW = window.screen.availWidth;
    const screenH = window.screen.availHeight;
    const winW = ${popupW};
    const winH = ${popupH};

    let x = Math.max(0, (screenW - winW) / 2);
    let vx = 480;
    let direction = 1;

    const BPM = ${BPM};
    const beatDuration = 60 / BPM;
    const riseFraction = 0.6;
    const fallFraction = 0.4;
    
    // Dynamic jump height based on image size and screen
    const jumpHeight = Math.min(260, screenH - winH - 20);
    const groundY = screenH - winH;

    function getJumpOffset(elapsedInBeat){
      const riseTime = beatDuration * riseFraction;
      const fallTime = beatDuration * fallFraction;
      if (elapsedInBeat <= riseTime) {
        const t = elapsedInBeat / riseTime;
        const eased = 1 - Math.pow(1 - t, 2);
        return -jumpHeight * eased;
      } else {
        const t = Math.min((elapsedInBeat - riseTime) / fallTime, 1);
        const eased = t * t;
        return -jumpHeight * (1 - eased);
      }
    }

    let lastBeatIndex = -1;
    let rollingThisJump = false;

    function maybeStartBarrelRoll(beatIndex){
      if (beatIndex === lastBeatIndex) return;
      lastBeatIndex = beatIndex;
      rollingThisJump = Math.random() < 0.35;
      if (rollingThisJump) {
        img.style.transition = 'none';
        img.style.transform = 'rotate(0deg)';
        const airborneMs = beatDuration * 1000 * 0.95;
        img.style.transition = \`transform \${airborneMs}ms linear\`;
        requestAnimationFrame(() => {
          img.style.transform = 'rotate(360deg)';
        });
      } else {
        img.style.transition = 'none';
        img.style.transform = 'rotate(0deg)';
      }
    }

    const TICK_MS = 16; 
    let startTime = performance.now();
    let lastTickTime = startTime;

    function tick(){
      const now = performance.now();
      const dt = (now - lastTickTime) / 1000; 
      lastTickTime = now;
      const elapsed = (now - startTime) / 1000;

      x += vx * direction * dt;
      if (x <= 0) {
        x = 0;
        direction = 1;
      } else if (x >= screenW - winW) {
        x = screenW - winW;
        direction = -1;
      }

      const elapsedInBeat = elapsed % beatDuration;
      const beatIndex = Math.floor(elapsed / beatDuration);
      maybeStartBarrelRoll(beatIndex);

      const jumpOffset = getJumpOffset(elapsedInBeat);
      const y = groundY + jumpOffset;

      try {
        window.moveTo(Math.round(x), Math.round(y));
        if (window.outerWidth !== winW || window.outerHeight !== winH) {
          window.resizeTo(winW, winH);
        }
      } catch(e) { }
    }

    try { window.moveTo(Math.round(x), groundY); } catch(e) {}
    setInterval(tick, TICK_MS);

    document.addEventListener('click', () => window.close());
    document.addEventListener('keydown', () => window.close());
  <\/script>
</body>
</html>`;
    }
  </script>
</body>
</html>
