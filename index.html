<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>click_here.exe</title>
<style>
  /* ===================================================================
     INTENTIONALLY UGLY / "LOW QUALITY" STYLING
     no rounded corners, no smooth transitions, default system fonts,
     gray Windows-98-ish button chrome. This is on purpose.
     =================================================================== */

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    width:100%;
    height:100%;
    background:#c0c0c0;
    color:#000;
    font-family:"MS Sans Serif", "Tahoma", Arial, sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:none;
  }

  .landing{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    text-align:center;
    position:relative;
  }

  .titlebar{
    position:absolute;
    top:0; left:0; right:0;
    background:linear-gradient(to right, #000080, #1084d0);
    color:#fff;
    font-weight:bold;
    font-size:13px;
    padding:4px 6px;
    text-align:left;
  }

  h1{
    font-size:16px;
    font-weight:bold;
    color:#000;
    margin-bottom:4px;
  }

  .imgFrame{
    border:2px inset #fff;
    background:#888;
    padding:2px;
    position:relative;
    width:280px;
    height:280px;
  }

  /* image itself: NO border-radius, square corners, sits absolutely
     positioned so JS can move it around to dodge the cursor */
  #prankImg{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:0;
    display:block;
    position:relative;
    cursor:pointer;
  }

  .btn{
    background:#c0c0c0;
    border:2px outset #fff;
    color:#000;
    font-family:inherit;
    font-size:13px;
    padding:6px 18px;
    cursor:pointer;
  }

  .btn:active{
    border:2px inset #fff;
  }

  .hint{
    color:#404040;
    font-size:11px;
  }

  .clickCounter{
    font-size:11px;
    color:#404040;
  }
</style>
</head>
<body>

  <div class="landing" id="landing">
    <div class="titlebar">photo_viewer.exe</div>
    <h1>double click image to view fullsize</h1>
    <div class="imgFrame" id="imgFrame">
      <img id="prankImg" src="https://i.pinimg.com/736x/98/5f/64/985f6478f070be18728e1a979b23026d.jpg" alt="">
    </div>
    <div class="hint">turn your volume up first</div>
    <div class="clickCounter" id="clickCounter"></div>
  </div>

  <audio id="prankAudio" src="https://worldwide-cyan-citufupp.edgeone.dev/basuri.mp3" loop preload="auto"></audio>

  <script>
    // =====================================================================
    // CONFIG
    // =====================================================================
    const SOUND_URL = "https://worldwide-cyan-citufupp.edgeone.dev/basuri.mp3";
    const IMAGE_URL  = "https://i.pinimg.com/736x/98/5f/64/985f6478f070be18728e1a979b23026d.jpg";

    // Set this to match the BPM of basuri.mp3 so the jump is timed to the beat.
    // One jump cycle (up + down) happens every beat.
    const BPM = 128;

    const imgFrame    = document.getElementById('imgFrame');
    const prankImg     = document.getElementById('prankImg');
    const landing       = document.getElementById('landing');
    const clickCounter  = document.getElementById('clickCounter');
    const originalAudio = document.getElementById('prankAudio');

    let dodgeCount = 0;

    // -----------------------------------------------------------------
    // DODGE BEHAVIOR (first 2 clicks)
    // -----------------------------------------------------------------
    function dodgeImage(){
      const frameRect = imgFrame.getBoundingClientRect();
      const maxX = window.innerWidth  - frameRect.width  - 20;
      const maxY = window.innerHeight - frameRect.height - 20;

      const newX = Math.max(10, Math.random() * maxX);
      const newY = Math.max(10, Math.random() * maxY);

      imgFrame.style.position = 'fixed';
      imgFrame.style.left = newX + 'px';
      imgFrame.style.top  = newY + 'px';
      imgFrame.style.margin = '0';
    }

    // also dodge on mouse approach, not just click, so it feels alive
    imgFrame.addEventListener('mouseenter', () => {
      if (dodgeCount < 2) {
        dodgeCount++;
        clickCounter.textContent = `attempts: ${dodgeCount}/3`;
        dodgeImage();
      }
    });

    prankImg.addEventListener('click', (e) => {
      e.stopPropagation();

      if (dodgeCount < 2) {
        // shouldn't normally fire since mouseenter already dodges it,
        // but just in case the click lands before the dodge does
        dodgeCount++;
        clickCounter.textContent = `attempts: ${dodgeCount}/3`;
        dodgeImage();
        return;
      }

      // third "click" (image finally caught) -> trigger the prank
      triggerPrank();
    });

    // -----------------------------------------------------------------
    // TRIGGER: play sound here, open jumping popup window
    // -----------------------------------------------------------------
    function triggerPrank(){
      clickCounter.textContent = 'attempts: 3/3';

      // play sound in this original window too (see playAudioReliably below)
      playAudioReliably(originalAudio);

      const popup = window.open('', '_blank', 'fullscreen=yes,width=' + screen.width + ',height=' + screen.height);

      if (popup) {
        popup.document.write(getPopupHTML());
        popup.document.close();
      }
      // landing page itself stays exactly as-is per spec, no fallback needed here
      // since the image has already been "caught" and doesn't need to do anything more.
    }

    // -----------------------------------------------------------------
    // AUDIO FIX: browsers often need play() retried / resumed because
    // the underlying network fetch for the <audio> hasn't resolved yet
    // by the time play() is first called, OR play() returns a promise
    // that can reject silently. We retry on canplay + handle the promise.
    // -----------------------------------------------------------------
    function playAudioReliably(audioEl){
      audioEl.currentTime = 0;
      audioEl.volume = 1;

      const tryPlay = () => {
        const p = audioEl.play();
        if (p !== undefined) {
          p.catch(() => {
            // if it failed because it wasn't ready yet, wait for canplay and retry once
            audioEl.addEventListener('canplaythrough', () => {
              audioEl.play().catch(()=>{});
            }, { once:true });
          });
        }
      };

      if (audioEl.readyState >= 3) {
        // HAVE_FUTURE_DATA or better, safe to play now
        tryPlay();
      } else {
        // not loaded enough yet, force a load and wait
        audioEl.load();
        audioEl.addEventListener('canplaythrough', tryPlay, { once:true });
        // also try immediately in case it's actually fine, covers more browsers
        tryPlay();
      }
    }

    // -----------------------------------------------------------------
    // POPUP WINDOW HTML: bouncing + jumping image, BPM-synced
    // -----------------------------------------------------------------
    function getPopupHTML(){
      return `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>:)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:#000;
    overflow:hidden;
    cursor:pointer;
  }
  #stage{
    position:fixed;
    inset:0;
  }
  #img{
    position:absolute;
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:0;
    image-rendering:pixelated;
    will-change:transform;
  }
  #hint{
    position:absolute;
    bottom:8px;
    left:50%;
    transform:translateX(-50%);
    color:#0f0;
    font-family:"Courier New",monospace;
    font-size:11px;
  }
</style>
</head>
<body>
  <div id="stage">
    <img id="img" src="${IMAGE_URL}" alt="">
    <div id="hint">click anywhere to close</div>
  </div>
  <audio id="a" src="${SOUND_URL}" loop preload="auto"></audio>
  <script>
    // ---- audio: same reliable-play fix as the main window ----
    const a = document.getElementById('a');
    function tryPlay(){
      a.currentTime = 0;
      const p = a.play();
      if (p !== undefined) {
        p.catch(() => {
          a.addEventListener('canplaythrough', () => a.play().catch(()=>{}), { once:true });
        });
      }
    }
    if (a.readyState >= 3) { tryPlay(); }
    else { a.load(); a.addEventListener('canplaythrough', tryPlay, { once:true }); tryPlay(); }

    // ---- movement: constant-speed horizontal bounce, instant reverse on wall hit ----
    const img = document.getElementById('img');
    const W = window.innerWidth;
    const H = window.innerHeight;
    const imgSize = 220;

    let x = Math.random() * (W - imgSize);
    let vx = 260; // px per second, constant "unstoppable force" speed
    let direction = 1;

    // ---- jump: timed to BPM, slow rise / fast fall, infinite repeat ----
    const BPM = ${BPM};
    const beatDuration = 60 / BPM;       // seconds per beat = seconds per jump cycle
    const riseFraction = 0.6;            // jump up takes 60% of the beat (slow rise)
    const fallFraction = 0.4;            // falling down takes 40% of the beat (faster fall)
    const jumpHeight = 160;              // px, how high it jumps

    function getY(elapsedInBeat){
      const riseTime = beatDuration * riseFraction;
      const fallTime = beatDuration * fallFraction;

      if (elapsedInBeat <= riseTime) {
        // rising: ease-out (starts fast off the ground, decelerates near apex)
        const t = elapsedInBeat / riseTime;
        const eased = 1 - Math.pow(1 - t, 2); // ease-out quad
        return -jumpHeight * eased;
      } else {
        // falling: ease-in (accelerates like gravity), capped at ground
        const t = Math.min((elapsedInBeat - riseTime) / fallTime, 1);
        const eased = t * t; // ease-in quad
        return -jumpHeight * (1 - eased);
      }
    }

    let startTime = null;

    function frame(now){
      if (startTime === null) startTime = now;
      const elapsed = (now - startTime) / 1000; // seconds since start

      // horizontal: constant speed, instant reverse at walls
      const dt = 1 / 60; // approx, fine for this purpose
      x += vx * direction * dt;

      if (x <= 0) {
        x = 0;
        direction = 1;
      } else if (x >= W - imgSize) {
        x = W - imgSize;
        direction = -1;
      }

      // vertical: BPM-synced jump, repeats every beat forever
      const elapsedInBeat = elapsed % beatDuration;
      const y = getY(elapsedInBeat);

      img.style.transform = \`translate(\${x}px, \${y}px)\`;

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    document.addEventListener('click', () => window.close());
    document.addEventListener('keydown', () => window.close());
  <\/script>
</body>
</html>`;
    }
  </script>

</body>
</html>
