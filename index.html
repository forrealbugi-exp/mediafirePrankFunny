<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>click_here.exe</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    width:100%;
    height:100%;
    background:#c0c0c0;
    color:#000;
    font-family:"MS Sans Serif", "Tahoma", Arial, sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:none;
  }

  .landing{
    width:100%;
    height:100vh;
    position:relative;
  }

  .titlebar{
    position:absolute;
    top:0; left:0; right:0;
    background:linear-gradient(to right, #000080, #1084d0);
    color:#fff;
    font-weight:bold;
    font-size:13px;
    padding:4px 6px;
    text-align:left;
  }

  .imgFrame{
    border:2px inset #fff;
    background:#888;
    padding:2px;
    position:fixed;
    width:280px;
    height:280px;
  }

  #prankImg{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:0;
    display:block;
    position:relative;
    cursor:pointer;
  }

  /* jumpscare flash overlay, covers the whole site, stretches to fill it */
  #jumpscare{
    position:fixed;
    inset:0;
    z-index:9999;
    background:#000;
    display:none;
    opacity:0;
  }

  #jumpscare img{
    width:100%;
    height:100%;
    object-fit:fill; /* stretches to fit the website's current size exactly */
    display:block;
  }

  #jumpscare.show{
    display:block;
  }

  /* fade-out only: appears instantly (no transition in), disappears slowly */
  #jumpscare.fading{
    transition: opacity 1.2s linear;
  }
</style>
</head>
<body>

  <div class="landing" id="landing">
    <div class="titlebar">FREE 1,000,000 ROBOX 100% NO VIRUS  INSTANT</div>
    <div class="imgFrame" id="imgFrame">
      <img id="prankImg" src="https://i.pinimg.com/736x/98/5f/64/985f6478f070be18728e1a979b23026d.jpg" alt="">
    </div>
  </div>

  <div id="jumpscare">
    <img src="https://i.pinimg.com/736x/c6/bf/30/c6bf3005814067707dff126cdf83029a.jpg" alt="">
  </div>

  <audio id="prankAudio" src="https://worldwide-cyan-citufupp.edgeone.dev/basuri.mp3" loop preload="auto"></audio>

  <script>
    // =====================================================================
    // CONFIG
    // =====================================================================
    const SOUND_URL  = "https://worldwide-cyan-citufupp.edgeone.dev/basuri.mp3";
    const IMAGE_URL   = "https://i.pinimg.com/736x/98/5f/64/985f6478f070be18728e1a979b23026d.jpg";
    const JUMPSCARE_IMG_URL = "https://i.pinimg.com/736x/c6/bf/30/c6bf3005814067707dff126cdf83029a.jpg";

    // BPM of basuri.mp3 - the popup window's jump is timed to this beat
    const BPM = 142;

    const imgFrame    = document.getElementById('imgFrame');
    const prankImg     = document.getElementById('prankImg');
    const jumpscareEl   = document.getElementById('jumpscare');
    const originalAudio = document.getElementById('prankAudio');

    let dodgeCount = 0;
    let dodging = false;

    // -----------------------------------------------------------------
    // AUDIO RELIABILITY FIX
    // -----------------------------------------------------------------
    function playAudioReliably(audioEl){
      audioEl.currentTime = 0;
      audioEl.volume = 1;

      const tryPlay = () => {
        const p = audioEl.play();
        if (p !== undefined) {
          p.catch(() => {
            audioEl.addEventListener('canplaythrough', () => {
              audioEl.play().catch(()=>{});
            }, { once:true });
          });
        }
      };

      if (audioEl.readyState >= 3) {
        tryPlay();
      } else {
        audioEl.load();
        audioEl.addEventListener('canplaythrough', tryPlay, { once:true });
        tryPlay();
      }
    }

    // -----------------------------------------------------------------
    // DODGE BEHAVIOR (first 2 attempts): image runs away in a straight
    // line to a random spot well inside the screen (never at the very
    // edges). Jumpscare image appears INSTANTLY at full opacity, then
    // fades out slowly. No sound plays for this anymore.
    // -----------------------------------------------------------------
    function dodgeImage(){
      if (dodging) return;
      dodging = true;

      const frameRect = imgFrame.getBoundingClientRect();
      const margin = 60;

      const minX = margin;
      const minY = margin + 40;
      const maxX = window.innerWidth  - frameRect.width  - margin;
      const maxY = window.innerHeight - frameRect.height - margin;

      const startX = frameRect.left;
      const startY = frameRect.top;
      const targetX = minX + Math.random() * Math.max(1, (maxX - minX));
      const targetY = minY + Math.random() * Math.max(1, (maxY - minY));

      // jumpscare: show INSTANTLY at full opacity (no fade-in), then fade out slowly
      jumpscareEl.classList.remove('fading'); // strip transition so the appear is instant
      jumpscareEl.classList.add('show');
      jumpscareEl.style.opacity = '1';

      // next frame: add the fade transition and drop opacity to 0 -> slow disappear
      requestAnimationFrame(() => {
        jumpscareEl.classList.add('fading');
        jumpscareEl.style.opacity = '0';
      });

      // animate the image running away in a straight line, linear, ~350ms
      const duration = 350;
      const t0 = performance.now();

      function frame(now){
        const t = Math.min((now - t0) / duration, 1);
        const x = startX + (targetX - startX) * t;
        const y = startY + (targetY - startY) * t;
        imgFrame.style.left = x + 'px';
        imgFrame.style.top  = y + 'px';

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          dodging = false;
        }
      }
      requestAnimationFrame(frame);

      // fully hide + reset after the fade-out transition finishes (1.2s)
      setTimeout(() => {
        jumpscareEl.classList.remove('show');
        jumpscareEl.classList.remove('fading');
      }, 1300);
    }

    window.addEventListener('load', () => {
      const r = imgFrame.getBoundingClientRect();
      imgFrame.style.position = 'fixed';
      imgFrame.style.left = r.left + 'px';
      imgFrame.style.top  = r.top + 'px';
      imgFrame.style.margin = '0';
    });

    imgFrame.addEventListener('mouseenter', () => {
      if (dodgeCount < 2) {
        dodgeCount++;
        dodgeImage();
      }
    });

    prankImg.addEventListener('click', (e) => {
      e.stopPropagation();

      if (dodgeCount < 2) {
        dodgeCount++;
        dodgeImage();
        return;
      }

      triggerPrank();
    });

    // -----------------------------------------------------------------
    // TRIGGER: play sound here, open the jumping popup window
    // -----------------------------------------------------------------
    function triggerPrank(){
      playAudioReliably(originalAudio);

      const popupW = 400;
      const popupH = 400;
      const popup = window.open('', '_blank', `width=${popupW},height=${popupH}`);

      if (popup) {
        popup.document.write(getPopupHTML(popupW, popupH));
        popup.document.close();
      }
    }

    // -----------------------------------------------------------------
    // POPUP WINDOW HTML: the OS WINDOW ITSELF jumps and bounces.
    //
    // IMPORTANT FIX: this loop now runs on setInterval instead of
    // requestAnimationFrame. Chrome (and other browsers) heavily
    // throttle rAF and JS timers once a window loses focus or is
    // treated as backgrounded - that throttling is what was causing
    // the jump to slow down/stop over time. Audible tabs/windows are
    // exempted from this throttling, and setInterval at a fixed
    // interval survives backgrounding far better than rAF does.
    // The window size is also locked and re-asserted every tick so
    // nothing can silently resize it.
    // -----------------------------------------------------------------
    function getPopupHTML(popupW, popupH){
      return `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>:)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:#000;
    overflow:hidden;
    cursor:pointer;
  }
  #img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:0;
    image-rendering:pixelated;
    will-change:transform;
  }
</style>
</head>
<body>
  <img id="img" src="${IMAGE_URL}" alt="">
  <audio id="a" src="${SOUND_URL}" loop preload="auto"></audio>
  <script>
    // ---- audio reliability fix ----
    const a = document.getElementById('a');
    function tryPlay(){
      a.currentTime = 0;
      const p = a.play();
      if (p !== undefined) {
        p.catch(() => {
          a.addEventListener('canplaythrough', () => a.play().catch(()=>{}), { once:true });
        });
      }
    }
    if (a.readyState >= 3) { tryPlay(); }
    else { a.load(); a.addEventListener('canplaythrough', tryPlay, { once:true }); tryPlay(); }

    // ---- window jump + bounce, driven by setInterval (NOT rAF) so it
    //      keeps running even when the window is backgrounded/loses focus ----
    const screenW = window.screen.availWidth;
    const screenH = window.screen.availHeight;
    const winW = ${popupW};
    const winH = ${popupH};

    let x = Math.max(0, (screenW - winW) / 2);
    let vx = 480;
    let direction = 1;

    const BPM = ${BPM};
    const beatDuration = 60 / BPM;
    const riseFraction = 0.6;
    const fallFraction = 0.4;
    const jumpHeight = Math.min(260, screenH - winH - 20);
    const groundY = screenH - winH;

    function getJumpOffset(elapsedInBeat){
      const riseTime = beatDuration * riseFraction;
      const fallTime = beatDuration * fallFraction;
      if (elapsedInBeat <= riseTime) {
        const t = elapsedInBeat / riseTime;
        const eased = 1 - Math.pow(1 - t, 2);
        return -jumpHeight * eased;
      } else {
        const t = Math.min((elapsedInBeat - riseTime) / fallTime, 1);
        const eased = t * t;
        return -jumpHeight * (1 - eased);
      }
    }

    let lastBeatIndex = -1;
    let rollingThisJump = false;

    function maybeStartBarrelRoll(beatIndex){
      if (beatIndex === lastBeatIndex) return;
      lastBeatIndex = beatIndex;
      rollingThisJump = Math.random() < 0.35;
      if (rollingThisJump) {
        img.style.transition = 'none';
        img.style.transform = 'rotate(0deg)';
        const airborneMs = beatDuration * 1000 * 0.95;
        img.style.transition = \`transform \${airborneMs}ms linear\`;
        requestAnimationFrame(() => {
          img.style.transform = 'rotate(360deg)';
        });
      } else {
        img.style.transition = 'none';
        img.style.transform = 'rotate(0deg)';
      }
    }

    const TICK_MS = 16; // ~60fps target, but tolerant if the browser delivers it slower
    let startTime = performance.now();
    let lastTickTime = startTime;

    function tick(){
      const now = performance.now();
      const dt = (now - lastTickTime) / 1000; // actual elapsed seconds since last tick
      lastTickTime = now;
      const elapsed = (now - startTime) / 1000;

      // horizontal: constant speed, instantly reverses at screen edges
      x += vx * direction * dt;
      if (x <= 0) {
        x = 0;
        direction = 1;
      } else if (x >= screenW - winW) {
        x = screenW - winW;
        direction = -1;
      }

      // vertical: BPM-synced jump, repeats forever, off the bottom of the screen
      const elapsedInBeat = elapsed % beatDuration;
      const beatIndex = Math.floor(elapsed / beatDuration);
      maybeStartBarrelRoll(beatIndex);

      const jumpOffset = getJumpOffset(elapsedInBeat);
      const y = groundY + jumpOffset;

      try {
        window.moveTo(Math.round(x), Math.round(y));
        // re-lock the size every tick in case anything tries to change it
        if (window.outerWidth !== winW || window.outerHeight !== winH) {
          window.resizeTo(winW, winH);
        }
      } catch(e) { /* some browsers may restrict this, fail silently */ }
    }

    try { window.moveTo(Math.round(x), groundY); } catch(e) {}
    setInterval(tick, TICK_MS);

    document.addEventListener('click', () => window.close());
    document.addEventListener('keydown', () => window.close());
  <\/script>
</body>
</html>`;
    }
  </script>

</body>
</html>
